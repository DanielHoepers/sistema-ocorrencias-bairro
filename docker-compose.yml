services:
  db:
    image: "${POSTGRES_IMAGE:-postgres:15-alpine}"
    container_name: "${POSTGRES_CONTAINER_NAME:-ocorrencias-db}"
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
      POSTGRES_DB: "${POSTGRES_DB:-ocorrencias_db}"
      POSTGRES_USER: "${POSTGRES_USER:-ocorrencias_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ocorrencias_pass}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:${POSTGRES_DATA_PATH:-/var/lib/postgresql/data}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:-5}

  backend:
    build:
      context: "${BACKEND_BUILD_CONTEXT:-./backend}"
    container_name: "${BACKEND_CONTAINER_NAME:-ocorrencias-backend}"
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      SPRING_APPLICATION_NAME: "${SPRING_APPLICATION_NAME:-ocorrencias}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://${POSTGRES_INTERNAL_HOST:-db}:${POSTGRES_CONTAINER_PORT:-5432}/${POSTGRES_DB:-ocorrencias_db}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-ocorrencias_user}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-ocorrencias_pass}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}"
      SPRING_JPA_OPEN_IN_VIEW: "${SPRING_JPA_OPEN_IN_VIEW:-false}"
      SPRING_JPA_FORMAT_SQL: "${SPRING_JPA_FORMAT_SQL:-true}"
      SPRING_FLYWAY_ENABLED: "${SPRING_FLYWAY_ENABLED:-true}"
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000,http://127.0.0.1:3000,http://localhost}"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*}"
      APP_JWT_SECRET: "${APP_JWT_SECRET:-chave-super-secreta-do-sistema-de-ocorrencias-bairro-2026}"
      APP_JWT_EXPIRATION_SECONDS: "${APP_JWT_EXPIRATION_SECONDS:-7200}"
      APP_AUTH_COOKIE_NAME: "${APP_AUTH_COOKIE_NAME:-bairro_token}"
      APP_AUTH_COOKIE_SECURE: "${APP_AUTH_COOKIE_SECURE:-false}"
      APP_AUTH_COOKIE_SAME_SITE: "${APP_AUTH_COOKIE_SAME_SITE:-Lax}"
      APP_ADMIN_CREATE_ENABLED: "${APP_ADMIN_CREATE_ENABLED:-true}"
      APP_ADMIN_NAME: "${APP_ADMIN_NAME:-Administrador}"
      APP_ADMIN_EMAIL: "${APP_ADMIN_EMAIL:-admin@bairro.local}"
      APP_ADMIN_PASSWORD: "${APP_ADMIN_PASSWORD:-Admin@12345}"
    ports:
      - "${BACKEND_HOST_PORT:-8080}:${BACKEND_CONTAINER_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: "${FRONTEND_BUILD_CONTEXT:-./frontend}"
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8080/api}"
    container_name: "${FRONTEND_CONTAINER_NAME:-ocorrencias-frontend}"
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8080/api}"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:${FRONTEND_CONTAINER_PORT:-80}"
    depends_on:
      - backend

volumes:
  postgres_data:
