# Exemplo para Render Blueprint.
# Antes de usar, troque os nomes/URLs e preencha segredos no painel do Render.

services:
  - type: web
    name: ocorrencias-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: SERVER_FORWARD_HEADERS_STRATEGY
        value: native
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://SEU_FRONTEND.onrender.com
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: ""
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_AUTH_COOKIE_SECURE
        value: "true"
      - key: APP_AUTH_COOKIE_SAME_SITE
        value: None
      - key: APP_ADMIN_CREATE_ENABLED
        value: "true"
      - key: APP_ADMIN_NAME
        value: Daniel Hoepers
      - key: APP_ADMIN_EMAIL
        value: danielrch.hoepers@gmail.com
      - key: APP_ADMIN_PASSWORD
        sync: false

  - type: web
    name: ocorrencias-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://SEU_BACKEND.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
